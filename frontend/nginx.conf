server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (PDF/Excel for AI extraction)
    client_max_body_size 25m;

    # Forward API calls to the backend container on the same origin,
    # so the httpOnly login cookie works without cross-site complications.
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # AI extraction can take a while
    }

    # Single-page app: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
