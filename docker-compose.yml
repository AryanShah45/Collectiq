# ===========================================================================
# CollectIQ — full stack in one command.
#
#   1. cp backend/.env.example backend/.env   (then edit JWT_SECRET, etc.)
#   2. docker compose up -d --build
#   3. open http://localhost:8080
#
# This runs three containers: MongoDB, the FastAPI backend, and the React
# frontend (served by nginx, which also forwards /api to the backend).
# ===========================================================================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Always talk to the bundled MongoDB container (overrides .env).
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
